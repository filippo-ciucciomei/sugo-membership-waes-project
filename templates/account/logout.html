{% extends "base.html" %}

{% block content %}
<section class="container py-5 text-center">
    <h1 class="mb-4">Log Out</h1>
    <p class="mb-4">Are you sure you want to log out?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-dark">Log Out</button>
    </form>
</section>
{% endblock %}
