{% extends "base.html" %}

{% block content %}

<h1>Edit Ride</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Save Changes</button>
</form>

<p>
    <a href="{% url 'ride_detail' object.slug %}">Cancel</a>
</p>

{% endblock %}
