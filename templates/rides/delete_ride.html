{% extends "base.html" %}

{% block content %}

<h1>Delete Ride</h1>

<p>Are you sure you want to delete this ride?</p>

<p><strong>{{ object.title }}</strong></p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete ride</button>
</form>

<p>
    <a href="{% url 'ride_detail' object.slug %}">Cancel</a>
</p>

{% endblock %}
