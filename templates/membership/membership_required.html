{% extends "base.html" %}

{% block content %}

<h1>Membership</h1>

<p>{{ message }}</p>

{% if has_active_membership %}
    <p>You already have access to member rides.</p>
{% else %}
    <a href="{% url 'membership_checkout' %}">
        <button type="button">{{ button_text }}</button>
    </a>
{% endif %}

{% endblock %}
